name: Playwright UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ALLURE_RESULTS_DIRECTORY: ${{ github.workspace }}/allure-results
      ALLURE_LOG_LEVEL: debug

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Install Playwright Browsers
        run: pwsh $(find . -name "playwright.ps1" | head -1) install --with-deps

      - name: Run .NET tests
        run: dotnet test --no-build --logger "trx;LogFileName=test_results.trx"

      - name: Ensure allure-results exists (even if empty)
        run: mkdir -p ${{ github.workspace }}/allure-results

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        if: always()
        run: allure generate ${{ github.workspace }}/allure-results -o ${{ github.workspace }}/allure-report --clean

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/**

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

name: Playwright UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ALLURE_RESULTS_DIRECTORY: allure-results
      ALLURE_LOG_LEVEL: debug

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🧰 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: 📦 Restore dependencies
        run: dotnet restore

      - name: Clean build output
        run: dotnet clean --verbosity normal

      - name: 🏗️ Build project
        run: dotnet build playwrightreqnroll.csproj --no-restore

      # Playwright install must come after build so it can find the assemblies
      - name: 🌐 Install Playwright browsers
        run: |
          dotnet tool install --global Microsoft.Playwright.CLI
          playwright install

      - name: 🧪 Run tests
        run: dotnet test --logger "trx;LogFileName=test-results.trx" --verbosity normal --diag:diag.log
        working-directory: ${{ github.workspace }}
        env:
          HEADLESS: true
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload diag.log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diag-log
          path: diag.log
          if-no-files-found: warn
          compression-level: 6
          overwrite: false
          include-hidden-files: false

      # --- Allure Integration ---
      - name: Install Allure CLI
        run: |
          sudo npm install -g allure-commandline

      - name: Generate Allure report
        run: |
          if [ -d allure-results ]; then
            echo "Generating Allure report from allure-results"
            allure generate allure-results --clean -o allure-report
          else
            echo "No allure-results directory found, skipping report generation."
            exit 1
          fi

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: warn
          compression-level: 6
          overwrite: false
          include-hidden-files: false

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

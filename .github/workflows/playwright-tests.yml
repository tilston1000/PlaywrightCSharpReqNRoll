name: Playwright UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ALLURE_RESULTS_DIRECTORY: allure-results
      ALLURE_LOG_LEVEL: debug

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t playwrightreqnroll .

      - name: Ensure entrypoint.sh is executable
        run: chmod +x entrypoint.sh

      - name: Install Reqnroll as local tool
        run: |
          dotnet new tool-manifest --force
          dotnet tool install Reqnroll --version 3.2.0

      - name: Run Reqnroll tests
        run: |
          dotnet tool run reqnroll test

      - name: List workspace files after test
        run: |
          echo "Listing workspace root after test run:"
          ls -l ${{ github.workspace }}
          echo "Listing allure-results directory:"
          ls -l ${{ github.workspace }}/allure-results || echo "allure-results not found"
          echo "Listing allure-report directory:"
          ls -l ${{ github.workspace }}/allure-report || echo "allure-report not found"

      - name: Ensure allure-results exists (even if empty)
        run: |
          mkdir -p ${{ github.workspace }}/allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/**
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

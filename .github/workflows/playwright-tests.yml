name: Playwright UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ALLURE_RESULTS_DIRECTORY: ${{ github.workspace }}/allure-results
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          cache: true
          cache-dependency-path: |
            **/*.csproj

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('.config/dotnet-tools.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Restore local .NET tools
        run: dotnet tool restore

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: dotnet tool run playwright install

      - name: Run .NET tests
        run: dotnet test --no-build --logger "trx;LogFileName=test_results.trx"
        env:
          SlowMo: 0

      - name: Collect Allure results
        if: always()
        shell: bash
        run: |
          mkdir -p "${{ github.workspace }}/allure-results"
          for dir in $(find "${{ github.workspace }}" -type d -name "allure-results"); do
            if [ "$dir" != "${{ github.workspace }}/allure-results" ]; then
              cp -f "$dir"/* "${{ github.workspace }}/allure-results/" 2>/dev/null || true
            fi
          done

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        if: always()
        run: allure generate ${{ github.workspace }}/allure-results -o ${{ github.workspace }}/allure-report --clean

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results
          path: ${{ github.workspace }}/allure-results

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report
          path: allure-report/

      - name: Upload Pages artifact
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ github.workspace }}/allure-report

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

name: Playwright UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      ALLURE_RESULTS_DIRECTORY: ${{ github.workspace }}/allure-results
      ALLURE_LOG_LEVEL: debug
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright CLI as local tool
        run: dotnet new tool-manifest --force && dotnet tool install Microsoft.Playwright.CLI

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Install Playwright Browsers (dotnet)
        run: dotnet tool run playwright install --with-deps

      - name: Run .NET tests
        run: dotnet test --no-build --logger "trx;LogFileName=test_results.trx"

      - name: Collect Allure results
        if: always()
        shell: bash
        run: |
          mkdir -p "${{ github.workspace }}/allure-results"
          echo "Discovered allure-results directories:"
          find "${{ github.workspace }}" -type d -name "allure-results" -print

          while IFS= read -r dir; do
            if [ "$dir" != "${{ github.workspace }}/allure-results" ]; then
              cp -f "$dir"/* "${{ github.workspace }}/allure-results/" 2>/dev/null || true
            fi
          done < <(find "${{ github.workspace }}" -type d -name "allure-results")

          echo "Files ready for upload:"
          ls -la "${{ github.workspace }}/allure-results" || true

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        if: always()
        run: allure generate ${{ github.workspace }}/allure-results -o ${{ github.workspace }}/allure-report --clean

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ${{ github.workspace }}/allure-results

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/allure-report

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

name: Playwright UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🧰 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: 📦 Restore dependencies
        run: dotnet restore

      - name: 🏗️ Build project
        run: dotnet build --no-restore

      - name: 🌐 Install Playwright browsers
        run: |
          dotnet tool install --global Microsoft.Playwright.CLI
          playwright install

      - name: 🧪 Run tests
        run: dotnet test --logger "trx;LogFileName=test-results.trx" --verbosity normal
        working-directory: ${{ github.workspace }}
        env:
          HEADLESS: true
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          ALLURE_RESULTS_DIRECTORY: ${{ github.workspace }}/allure-results
          ALLURE_LOG_LEVEL: debug

      - name: Print working directory
        run: pwd

      - name: Print environment variables
        run: printenv | sort

      - name: List files before test run
        run: ls -l

      - name: List workspace files
        run: ls -l

      - name: List allure-results contents after test
        run: |
          if [ -d "allure-results" ]; then
            ls -l allure-results
            find allure-results -type f
          else
            echo "allure-results directory does not exist"
          fi

      - name: Print ci-debug.txt if exists
        run: |
          if [ -f "allure-results/ci-debug.txt" ]; then
            cat allure-results/ci-debug.txt
          else
            echo "ci-debug.txt not found"
          fi

      # --- Allure Integration ---
      - name: Install Allure CLI
        run: |
          sudo npm install -g allure-commandline

      - name: Generate Allure report
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Upload allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

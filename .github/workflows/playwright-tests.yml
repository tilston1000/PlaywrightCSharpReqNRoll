name: Playwright UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      browser:
        description: Browser to run in CI
        required: true
        default: all
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-ui-tests:
    name: Run UI Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJson(github.event_name == 'workflow_dispatch' && (inputs.browser == 'all' && '["chromium","firefox","webkit"]' || format('["{0}"]', inputs.browser)) || '["chromium","firefox","webkit"]') }}
    env:
      ALLURE_RESULTS_DIRECTORY: ${{ github.workspace }}/allure-results-${{ matrix.browser }}
      BROWSER: ${{ matrix.browser }}
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('.config/dotnet-tools.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ matrix.browser }}-
            ${{ runner.os }}-playwright-

      - name: Restore local .NET tools
        run: dotnet tool restore

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Install Playwright browsers
        run: dotnet tool run playwright install --with-deps ${{ matrix.browser }}

      - name: Run .NET tests
        run: dotnet test --no-build --logger "trx;LogFileName=test_results_${{ matrix.browser }}.trx"
        env:
          HEADLESS: true
          SlowMo: 0

      - name: Collect Allure results
        if: always()
        shell: bash
        run: |
          mkdir -p "${{ github.workspace }}/allure-results-${{ matrix.browser }}"
          for dir in $(find "${{ github.workspace }}" -type d -name "allure-results"); do
            if [ "$dir" != "${{ github.workspace }}/allure-results-${{ matrix.browser }}" ]; then
              cp -f "$dir"/* "${{ github.workspace }}/allure-results-${{ matrix.browser }}/" 2>/dev/null || true
            fi
          done

      - name: Write Allure environment metadata
        if: always()
        shell: bash
        run: |
          cat > "${{ github.workspace }}/allure-results-${{ matrix.browser }}/environment.properties" << EOF
          Browser=${{ matrix.browser }}
          Execution=ci
          Workflow=${{ github.workflow }}
          EOF

      - name: Write Allure executor metadata
        if: always()
        shell: bash
        run: |
          cat > "${{ github.workspace }}/allure-results-${{ matrix.browser }}/executor.json" << EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "${{ github.workflow }} #${{ github.run_number }} (${{ matrix.browser }})",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "CI ${{ matrix.browser }}"
          }
          EOF

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Upload TRX test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-trx-${{ matrix.browser }}
          path: |
            **/*_${{ matrix.browser }}.trx
          if-no-files-found: warn

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline@2

      - name: Generate Allure Report
        if: always()
        run: allure generate ${{ github.workspace }}/allure-results-${{ matrix.browser }} -o ${{ github.workspace }}/allure-report-${{ matrix.browser }} --clean

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-${{ matrix.browser }}
          path: ${{ github.workspace }}/allure-results-${{ matrix.browser }}

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report-${{ matrix.browser }}
          path: ${{ github.workspace }}/allure-report-${{ matrix.browser }}/

  merge-allure-reports:
    name: Merge Allure Reports
    if: always()
    needs: run-ui-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      has_merged_report: ${{ steps.report_check.outputs.has_report }}
    steps:
      - name: Download previous Allure history
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: allure-history
          path: allure-results-history

      - name: Download Allure results (chromium)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: allure-results-chromium
          path: allure-results-chromium

      - name: Download Allure results (firefox)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: allure-results-firefox
          path: allure-results-firefox

      - name: Download Allure results (webkit)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: allure-results-webkit
          path: allure-results-webkit

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Allure CLI
        run: npm install -g allure-commandline@2

      - name: Restore Allure history for trend tracking
        shell: bash
        run: |
          if [ -d "allure-results-history" ] && [ -d "allure-results-history/history" ]; then
            mkdir -p allure-results-history-only/history
            cp -r allure-results-history/history/* allure-results-history-only/history/ 2>/dev/null || true
            echo "History restored into dedicated folder for trend tracking."
          else
            echo "No previous history found; starting fresh."
          fi

      - name: Generate merged Allure report
        shell: bash
        run: |
          set -euo pipefail

          RESULT_DIRS=()
          for dir in allure-results-chromium allure-results-firefox allure-results-webkit; do
            if [ -d "$dir" ] && find "$dir" -maxdepth 1 -type f -name '*.json' | grep -q .; then
              # Remove per-browser executor metadata so merged report does not inherit a single-browser title.
              rm -f "$dir/executor.json"
              RESULT_DIRS+=("$dir")
            fi
          done

          if [ ${#RESULT_DIRS[@]} -eq 0 ]; then
            echo "No Allure result artifacts were downloaded; skipping merged report generation."
            exit 0
          fi

          mkdir -p allure-results-merged-meta
          cat > "allure-results-merged-meta/executor.json" << EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "${{ github.workflow }} #${{ github.run_number }} (merged)",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "CI All Browsers"
          }
          EOF

          # Prepend dedicated history folder (if it exists) so merged report inherits trends without duplicating results.
          if [ -d "allure-results-history-only" ]; then
            RESULT_DIRS=("allure-results-merged-meta" "allure-results-history-only" "${RESULT_DIRS[@]}")
          else
            RESULT_DIRS=("allure-results-merged-meta" "${RESULT_DIRS[@]}")
          fi

          allure generate "${RESULT_DIRS[@]}" -o allure-report --clean

      - name: Check merged report presence
        id: report_check
        if: always()
        shell: bash
        run: |
          if [ -d "allure-report" ] && find "allure-report" -type f | grep -q .; then
            echo "has_report=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_report=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload merged Allure report
        if: always() && steps.report_check.outputs.has_report == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: allure-report-merged
          path: allure-report/

      - name: Save Allure history for next run
        if: always() && steps.report_check.outputs.has_report == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: allure-history
          path: allure-report/history/
          retention-days: 30

      - name: Upload Pages artifact
        if: always() && github.ref == 'refs/heads/main' && steps.report_check.outputs.has_report == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@v5
        with:
          path: allure-report

      - name: Add workflow summary
        if: always()
        shell: bash
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo "## Playwright + Allure Summary"
            echo
            echo "- Run: [${{ github.run_id }}](${RUN_URL})"
            echo "- Artifacts page: [View artifacts](${RUN_URL}#artifacts)"
            echo
            echo "### Browser Matrix"
            echo "- chromium"
            echo "- firefox"
            echo "- webkit"
            echo
            echo "### Expected Artifacts"
            echo "- test-results-trx-chromium"
            echo "- test-results-trx-firefox"
            echo "- test-results-trx-webkit"
            echo "- allure-results-chromium"
            echo "- allure-results-firefox"
            echo "- allure-results-webkit"
            echo "- allure-report-chromium"
            echo "- allure-report-firefox"
            echo "- allure-report-webkit"
            echo "- allure-report-merged"
            echo
            echo "### Published Report"
            echo "- On pushes to main, the merged report is published to GitHub Pages by the deploy job."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-to-pages:
    name: Deploy to Pages
    if: always() && github.ref == 'refs/heads/main' && needs.merge-allure-reports.outputs.has_merged_report == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: merge-allure-reports
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

name: Playwright UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ALLURE_RESULTS_DIRECTORY: ${{ github.workspace }}/allure-results
      ALLURE_LOG_LEVEL: debug

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: List build output and .playwright directory
        run: |
          echo "Listing bin/Debug directory:"
          ls -lR bin/Debug || dir bin/Debug
          echo "Listing .playwright directory:"
          ls -lR .playwright || dir .playwright
          echo "Listing root directory:"
          ls -l || dir
        shell: bash

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright CLI as local tool
        run: dotnet new tool-manifest --force && dotnet tool install Microsoft.Playwright.CLI

      - name: Install Playwright Browsers (dotnet)
        run: dotnet tool run playwright install --with-deps

      - name: Run .NET tests
        run: dotnet test --no-build --logger "trx;LogFileName=test_results.trx"

      - name: Ensure allure-results exists (even if empty)
        run: mkdir -p ${{ github.workspace }}/allure-results

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        if: always()
        run: allure generate ${{ github.workspace }}/allure-results -o ${{ github.workspace }}/allure-report --clean

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/**

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
